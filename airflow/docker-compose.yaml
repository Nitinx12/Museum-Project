# ═══════════════════════════════════════════════════════════════════
#  Museum — Airflow 3.0.2  |  CeleryExecutor  |  Fixed & Extended
#
#  FIXES APPLIED vs. original template:
#    [1] CeleryExecutor         — was LocalExecutor (broke redis + worker)
#    [2] SQL_ALCHEMY_CONN       — missing; Airflow couldn't find metadata DB
#    [3] CELERY_BROKER_URL      — missing; workers couldn't reach Redis
#    [4] CELERY_RESULT_BACKEND  — missing; task results had nowhere to go
#    [5] museum_net network     — missing; Airflow couldn't reach Mongo/PG
#    [6] Museum env vars        — missing; DAG tasks had no DB config
#    [7] src/ + data/ volumes   — missing; pipeline code/CSVs unreachable
#    [8] Dockerfile base 3.0.2  — was 2.9.2; provider pins incompatible
# ═══════════════════════════════════════════════════════════════════

---
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment: &airflow-common-env
    # ── [FIX 1] Executor: CeleryExecutor (was LocalExecutor) ────────
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__FERNET_KEY: "${FERNET_KEY}"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"

    # ── [FIX 2] Metadata DB connection (was missing entirely) ────────
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow

    # ── [FIX 3+4] Celery broker + result backend (both missing) ─────
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0

    # ── API / UI ──────────────────────────────────────────────────────
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
    AIRFLOW__WEBSERVER__SECRET_KEY: "${WEBSERVER_SECRET_KEY}"
    AIRFLOW_CONFIG: "/opt/airflow/config/airflow.cfg"

    # ── [FIX 6] Museum pipeline env vars (all missing before) ────────
    # Points at the services in your existing museum docker-compose.yml
    MONGO_HOST: "${MONGO_SERVICE_NAME:-mongo}"   # set in .env if your service is named differently
    MONGO_PORT: "27017"
    MONGO_DB: "${MONGO_DB:-museum}"

    MUSEUM_PG_HOST: "${MUSEUM_PG_SERVICE_NAME:-museum-postgres}"  # your museum data postgres
    MUSEUM_PG_PORT: "5432"
    MUSEUM_PG_DB: "${MUSEUM_PG_DB:-museum}"
    MUSEUM_PG_USER: "${MUSEUM_PG_USER:-postgres}"
    MUSEUM_PG_PASSWORD: "${MUSEUM_PG_PASSWORD:-postgres}"

    # ── Java / PySpark ────────────────────────────────────────────────
    JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
    PYSPARK_PYTHON: python3

    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-}

  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-.}/config:/opt/airflow/config
    - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
    # ── [FIX 7] src/ and data/ were missing ─────────────────────────
    - ${AIRFLOW_PROJ_DIR:-.}/src:/opt/airflow/src       # your pipeline Python modules
    - ${AIRFLOW_PROJ_DIR:-.}/data:/opt/airflow/data     # CSV input files

  user: "${AIRFLOW_UID:-50000}:0"

  # ── [FIX 5] Attach to museum network so Airflow can reach Mongo/PG ─
  networks:
    - airflow_internal   # internal: postgres + redis
    - museum_net         # external: your museum mongo + postgres

  depends_on:
    &airflow-common-depends-on
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy


services:

  # ── Airflow metadata DB (dedicated; separate from your museum PG) ──
  postgres:
    image: postgres:13
    container_name: museum_airflow_metadb
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always
    networks:
      - airflow_internal   # only needs internal; not exposed to museum_net

  # ── Message broker for Celery ──────────────────────────────────────
  redis:
    image: redis:7.2-bookworm
    container_name: museum_airflow_redis
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    restart: always
    networks:
      - airflow_internal

  # ── API server (Airflow 3.x replaces webserver) ───────────────────
  airflow-apiserver:
    <<: *airflow-common
    container_name: museum_airflow_apiserver
    command: api-server
    ports:
      - "9100:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ── Scheduler ─────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: museum_airflow_scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ── DAG processor (Airflow 3.x new component) ─────────────────────
  airflow-dag-processor:
    <<: *airflow-common
    container_name: museum_airflow_dag_processor
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ── Celery worker ─────────────────────────────────────────────────
  airflow-worker:
    <<: *airflow-common
    container_name: museum_airflow_worker
    command: celery worker
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}" || celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-apiserver:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # ── Triggerer (async task support) ────────────────────────────────
  airflow-triggerer:
    <<: *airflow-common
    container_name: museum_airflow_triggerer
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ── One-shot initializer ──────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: museum_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        if [[ -z "${AIRFLOW_UID}" ]]; then
          echo
          echo -e "\033[1;33mWARNING!!!: AIRFLOW_UID not set!\e[0m"
          echo "For Windows, set AIRFLOW_UID=0 in your .env file."
          echo
          export AIRFLOW_UID=$(id -u)
        fi
        one_meg=1048576
        mem_available=$$(($$(getconf _PHYS_PAGES) * $$(getconf PAGE_SIZE) / one_meg))
        cpus_available=$$(grep -cE 'cpu[0-9]+' /proc/stat)
        disk_available=$$(df / | tail -1 | awk '{print $$4}')
        warning_resources="false"
        if (( mem_available < 4000 )) ; then
          echo -e "\033[1;33mWARNING!!!: Not enough memory. Need 4GB+, have $$(numfmt --to iec $$((mem_available * one_meg)))\e[0m"
          warning_resources="true"
        fi
        if (( cpus_available < 2 )); then
          echo -e "\033[1;33mWARNING!!!: Need 2+ CPUs, have $${cpus_available}\e[0m"
          warning_resources="true"
        fi
        if (( disk_available < one_meg * 10 )); then
          echo -e "\033[1;33mWARNING!!!: Need 10GB+ disk, have $$(numfmt --to iec $$((disk_available * 1024)))\e[0m"
          warning_resources="true"
        fi
        echo
        echo "Creating missing opt dirs if missing:"
        mkdir -v -p /opt/airflow/{logs,dags,plugins,config,src,data}
        echo
        echo "Airflow version:"
        /entrypoint airflow version
        echo
        /entrypoint airflow config list >/dev/null
        echo
        chown -R "${AIRFLOW_UID}:0" /opt/airflow/
        chown -v -R "${AIRFLOW_UID}:0" /opt/airflow/{logs,dags,plugins,config,src,data}
        echo
        echo "✅ Museum Airflow init complete"
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: ""
    user: "0:0"
    restart: "no"

  # ── Debug CLI (activate with: docker compose --profile debug up airflow-cli) ──
  airflow-cli:
    <<: *airflow-common
    container_name: museum_airflow_cli
    profiles:
      - debug
    environment:
      <<: *airflow-common-env
      CONNECTION_CHECK_MAX_COUNT: "0"
    command:
      - bash
      - -c
      - airflow
    depends_on:
      <<: *airflow-common-depends-on

  # ── Celery Flower monitor (activate with: --profile flower) ───────
  flower:
    <<: *airflow-common
    container_name: museum_airflow_flower
    command: celery flower
    profiles:
      - flower
    ports:
      - "5555:5555"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:5555/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully


volumes:
  postgres-db-volume:


# ── [FIX 5] Networks ──────────────────────────────────────────────────
networks:
  airflow_internal:
    driver: bridge   # postgres + redis stay here; not exposed outside

  museum_net:
    external: true   # shared with your museum docker-compose.yml
    # ► Run once to create it:  docker network create museum_net
    # ► Then add  networks: [museum_net]  to your mongo + postgres services